syntax = "proto3";

message AuthData {
  string identifier = 1;
  string client_ip = 2;
}

message AuthResponse {
  bool success = 1;
}

message RecvRootStage2Data {
  uint32 send_pid = 1;
  int32 send_dev_id = 2;
  bool failed = 3;
  string error_msg = 4;
}

message SendClientStage2Data {
  uint32 recv_pid = 1;
  int32 recv_dev_id = 2;
  repeated bytes recv_buffer_names = 3; // Array of 65 bytes
  repeated bytes send_done_names = 4;  // Array of 65 bytes
  bool failed = 5;
  string error_msg = 6;
}

message RecvRootStage3Data {
  repeated bytes recv_ready_names = 1; // Array of 65 bytes
  bool failed = 2;
  string error_msg = 3;
}

message SendRootStage2Data {
  uint32 recv_pid = 1;
  int32 recv_dev_id = 2;
  bool failed = 3;
  string error_msg = 4;
}

message RecvClientStage2Data {
  uint32 send_pid = 1;
  int32 send_dev_id = 2;
  repeated bytes recv_ready_names = 3; // Array of 65 bytes
  bool failed = 4;
  string error_msg = 5;
}

message SendRootStage3Data {
  repeated bytes recv_buffer_names = 1; // Array of 65 bytes
  repeated bytes send_done_names = 2;  // Array of 65 bytes
  bool failed = 3;
  string error_msg = 4;
}

message InitEndMsg {
  bool failed = 1;
  string error_msg = 2;
}