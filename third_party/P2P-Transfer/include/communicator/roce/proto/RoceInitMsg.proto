syntax = "proto3";

message SenderData {
  uint32 sendNpuIpv4 = 1;
};

message ReceiverData {
  uint32 recvNpuIpv4 = 1;
  uint32 recvListenPort = 2;
  string tag = 3;
};

message ReceiverNpuResources {
  repeated uint64 recvBuffAddrs = 1;
  repeated uint64 sendDoneNotifyAddrs = 2;
};

message SenderNpuResources {
  repeated uint64 sendBuffAddrs = 1;
  repeated uint64 recvReadyNotifyAddrs = 2;
  uint64 recvCompleteNotifyAddr = 3;
};