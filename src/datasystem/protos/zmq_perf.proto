/**
 * Description: Protobuf for performance measurement
 */
syntax = "proto3";
package datasystem.st;
import "rpc_option.proto";
import "utils.proto";
import "meta_zmq.proto";

option cc_enable_arenas = true;

enum opType {
  PAYLOAD_MEMCPY = 0;
  PAYLOAD_NO_MEMCPY = 1;
}
message RunPb {
  opType op = 1;
  int64 payload_sz = 2;
  int64 num_iteration = 3;
  int64 packet_sz = 4;
}

message SayHelloPb {
  string msg = 1;
  int64 seq_no = 2;
}

message PayloadTickRqPb {
  uint64 nanoseconds_since_epoch = 1;
}
message PayloadTickResPb {
  uint64 nanoseconds_payload_received = 1;
  int64 payload_duration = 2;
}

service PerfService {
  rpc SendPayload (RunPb) returns (ErrorInfoPb) {
    option (datasystem.send_payload_option) = true;
  }
  rpc RecvPayload (RunPb) returns (ErrorInfoPb) {
    option (datasystem.recv_payload_option) = true;
  }
  rpc SimpleGreeting(MetaPb) returns (MetaPb) {}
  rpc UnarySocketSendPayload(MetaPb) returns (MetaPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.send_payload_option) = true;
  }
  rpc UnarySocketRecvPayload(MetaPb) returns (MetaPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.recv_payload_option) = true;
  }
  rpc UnarySocketSimpleGreeting(MetaPb) returns (MetaPb) {
    option (datasystem.unary_socket_option) = true;
  }
}

message PerfRunLapPb {
  repeated int64 lap = 1;
  string tick_name = 2;
}

message PerfRunRqPb {
  int64 num_iterations = 1;
  bool local_client = 2;
  bool tcp_direct = 3;
  bool no_memcpy = 4;
}

message PerfRunResPb {
  repeated int64 elapsed_time = 1;
  PerfRunLapPb time = 2;
}

message PerfTickRunResPb {
  repeated int64 elapsed_time = 1;
  repeated PerfRunLapPb time = 2;
}

service PerfAgentService {
  rpc AgentSimpleGreeting(PerfRunRqPb) returns (PerfRunResPb) {}
  rpc AgentUnarySocketSendPayloadRun(PerfRunRqPb) returns (PerfRunResPb) {}
  rpc AgentUnarySocketRecvPayloadRun(PerfRunRqPb) returns (PerfRunResPb) {}
  rpc AgentUnarySocketSimpleGreetingRun(PerfRunRqPb) returns (PerfRunResPb) {}
  rpc AgentDirectSendPayloadRun(PerfRunRqPb) returns (PerfRunResPb) {}
  rpc AgentSimpleTickRun(PerfRunRqPb) returns (PerfTickRunResPb) {}
}
