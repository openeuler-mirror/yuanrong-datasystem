/**
 * Description: Defines the RPC API of the worker component, including the meta of the object cache and state cache.
 * These APIs are used for communication between workers and workers or master to worker.
 */
syntax = "proto3";
package datasystem;
 
enum HashFunctionPb {
    XXHASH64 = 0;
    MURMURHASH3_X64 = 1;
    CITYHASH64 = 2;
}
 
message TableMetaPb {
  string table_key = 1;
  int32 table_index = 2;
  string table_name = 3;
  int32 dim_size = 4; //一条数据大小
  int32 table_capacity = 5; //桶内数据条数
  int32 bucket_num = 6; 
  HashFunctionPb hashfunction = 7;
  int32 bucket_capacity = 8;
}
 
message BucketMetaPb {
  string bucket_key = 1;
  string table_key = 2;
  int32 table_index = 3;
  string table_name = 4;
  int32 dim_size = 5; //一条数据大小
  int32 bucket_capacity = 6; //桶阈值
}