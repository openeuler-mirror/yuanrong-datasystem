/**
 * Description: Defines the RPC API of the worker component, including the meta of the object cache and state cache.
 * These APIs are used for communication between workers and workers or master to worker.
 */
syntax = "proto3";
package datasystem;
import "datasystem/protos/utils.proto";
import "datasystem/protos/rpc_option.proto";
import "datasystem/protos/object_posix.proto";
import "datasystem/protos/hash_ring.proto";
import "datasystem/protos/p2p_subscribe.proto";
import "datasystem/protos/meta_transport.proto";

option cc_enable_arenas = true;

message GetObjectRemoteReqPb {
  string object_key = 1;
  string request_id = 2;
  bool try_lock = 3;
  uint64 version = 4;
  uint64 read_offset = 5;
  uint64 read_size = 6;
  uint64 data_size = 7;
  UrmaRemoteAddrPb urma_info = 8;
  UcpRemoteInfoPb ucp_info = 9;
  string comm_id = 10;
  string urma_instance_id = 11;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GetObjectRemoteRspPb {
  int64 data_size = 1;
  int64 create_time = 3;
  uint32 life_state = 4;
  DataTransferSource data_source = 5;
  ErrorInfoPb error = 6;
  RemoteH2DHostInfoPb host_info = 7;
}

message BatchGetObjectRemoteReqPb {
  repeated GetObjectRemoteReqPb requests = 1;
  string comm_id = 2;
  string urma_instance_id = 3;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message BatchGetObjectRemoteRspPb {
  repeated GetObjectRemoteRspPb responses = 1;
  RemoteH2DRootInfoPb root_info = 2;
}

message CheckEtcdStateReqPb {
  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message CheckEtcdStateRspPb {
  bool available = 1;
}

message GetClusterStateReqPb {
  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GetClusterStateRspPb {
  bool etcd_available = 1;
  HashRingPb hash_ring = 2;
}

enum MigrateType {
  SCALE_DOWN = 0;
  SPILL = 1;
}

message MigrateDataReqPb {
  message ObjectInfoPb {
    string object_key = 1;
    uint64 version = 2;
    uint64 data_size = 3;
    repeated uint32 part_index = 4;
    uint32 cache_type = 5;
  }
  repeated ObjectInfoPb objects = 1;
  string worker_addr = 2;
  uint64 bytes_send = 3;
  MigrateType type = 4;
  bool is_slot_migration = 5;
  bool is_retry = 6;
  uint32 slot_id = 7;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message MigrateDataRspPb {
  uint64 remain_bytes = 1;
  repeated string success_ids = 2;
  repeated string fail_ids = 3;
  uint64 disk_remain_bytes = 4;
  double available_ratio = 5;
  double disk_available_ratio = 6;
  enum ScaleDownState {
    NONE = 0;          // No scale-down operation
    NEED_SCALE_DOWN = 1; // Scale-down is needed
    DATA_MIGRATION_STARTED = 2; // Data migration for scale-down has started
  }
  ScaleDownState scale_down_state = 7;
  uint64 limit_rate = 8;
}

message MigrateDataDirectReqPb {
  message ObjectInfoPb {
    string object_key = 1;
    uint64 version = 2;
    uint64 data_size = 3;
    UrmaRemoteAddrPb urma_info = 4;
  }
  repeated ObjectInfoPb objects = 1;
  string worker_addr = 2;
  bool is_slot_migration = 3;
  uint32 slot_id = 4;
  bool is_retry = 5;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message MigrateDataDirectRspPb {
  uint64 remain_bytes = 1;
  repeated string failed_object_keys = 2;
}

service WorkerWorkerTransportService {
  // Named to avoid redefinition of ExchangeUrmaConnectInfoSvcMethod with WorkerOCService in object_posix.proto.
  rpc WorkerWorkerExchangeUrmaConnectInfo(UrmaHandshakeReqPb) returns (UrmaHandshakeRspPb) {}
}

service WorkerWorkerOCService {
  option (datasystem.channel_number_option) = 2;
  option (datasystem.multi_session_option) = true;
  rpc GetObjectRemote(GetObjectRemoteReqPb) returns (GetObjectRemoteRspPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.recv_payload_option) = true;
    option (datasystem.urma_enabled_option) = true;
  }
  rpc CheckEtcdState(CheckEtcdStateReqPb) returns (CheckEtcdStateRspPb) {}
  rpc MigrateData(MigrateDataReqPb) returns (MigrateDataRspPb) {
    option (datasystem.send_payload_option) = true;
  }
  rpc GetClusterState(GetClusterStateReqPb) returns (GetClusterStateRspPb) {}
  rpc BatchGetObjectRemote(BatchGetObjectRemoteReqPb) returns (BatchGetObjectRemoteRspPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.recv_payload_option) = true;
    option (datasystem.urma_enabled_option) = true;
  }
  rpc MigrateDataDirect(MigrateDataDirectReqPb) returns (MigrateDataDirectRspPb) {}
}

message UpdateObjectInfoPb {
  string object_key = 1;
  string address = 2;
  uint64 version = 3; // version control
  // For the meaning of the value, see 'ObjectLifeState' enum class.
  uint32 life_state = 4;
  repeated string secondary_keys = 5;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message UpdateObjectReqPb {
  repeated UpdateObjectInfoPb object_infos = 1;
  bool sync = 2;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message UpdateObjectRspPb {
  repeated string failed_ids = 1;
}

message PushMetaToWorkerReqPb {
  repeated string gref_object_keys = 1;
  repeated UpdateObjectInfoPb cache_invalids = 2;
  repeated string delete_object_keys = 3;
  repeated string primary_copy_invalid_ids = 4;
  bool is_restart = 5;
  bytes source_address = 6;  // the address of the node where req came from
  int64 event_timestamp = 7;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message PushMetaToWorkerRspPb {
}

message RequestMetaFromWorkerReqPb {
  bytes address = 1;
  bytes db_name = 2;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message RequestMetaFromWorkerRspPb {
  bytes address = 1;
  repeated ObjectMetaPb metas = 2; // Need persisted object metadata.
  repeated string gref_object_keys = 3; // Global reference object key list.
}

message NotifyMasterIncNestedReqPb {
  repeated string nested_object_keys = 1;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message NotifyMasterIncNestedResPb {
}

message NotifyMasterDecNestedReqPb {
  repeated string nested_object_keys = 1;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message NotifyMasterDecNestedResPb {
}

message ChangePrimaryCopyReqPb {
  repeated string object_keys = 1;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ChangePrimaryCopyRspPb {
  repeated string success_ids = 1;
}

message ConfigPb {
  // The config of object

  // For the meaning of the value, see 'WriteMode' enum class.
  uint32 write_mode = 1;

  // For the meaning of the value, see 'DataFormat' enum class.
  uint32 data_format = 2;

  // For the meaning of the value, see 'ConsistencyType' enum class.
  uint32 consistency_type = 3;

  uint32 cache_type = 4;

  // If true, this won't invalidate existing copies.
  bool is_replica = 5;
}

message ObjectBaseInfoPb {
  string object_key = 1;
  uint64 data_size = 2;
  DeviceMetaInfoPb device_info = 3;
}

message ObjectMetaPb {
  string object_key = 1;
  uint64 data_size = 2;
  uint64 version = 3; // version control
  // For the meaning of the value, see 'ObjectLifeState' enum class.
  uint32 life_state = 4;
  ConfigPb config = 5;
  string primary_address = 6;
  uint32 ttl_second = 7;
  ExistenceOptPb existence = 8;
  DeviceMetaInfoPb device_info = 9;
}


message PublishMetaReqPb {
  ObjectMetaPb meta = 1;
  bytes address = 2;
  uint64 timeout = 3;
  bool is_from_other_az = 4;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message PublishMetaRspPb {
}

message MetaChangeReqPb {
  string new_meta_addr = 1;
  string object_key = 2;
  uint64 timeout = 3;
  bool is_from_other_az = 4;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message MetaChangeRspPb {
}

message ClearDataReqPb {
  message LostRangesPb {
    uint32 from = 1;
    uint32 end = 2;
  }
  repeated LostRangesPb ranges = 1;
  repeated string objKeys_migrate_finished = 2;
  repeated string worker_ids = 3; // remove workers uuids
  string standby_worker = 4;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ClearDataRspPb {
}

message ReplicaPb {
  string worker_id = 1;
  int64 seq = 2;
}

message ReplicaGroupPb {
  repeated ReplicaPb replicas = 1;
  string primary_id = 2;
}

message TryPSyncReqPb {
  string db_name = 1;
  string backup_node_id = 2;
  int64 seq = 3;
  string replica_id = 4;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message TryPSyncRspPb {
}

message PushNewLogsReqPb {
  enum ActionType {
    WRITE_LOG = 0; HEARTBEAT = 1; SHUTDOWN = 2;
  }
  string db_name = 1;
  ActionType action_type = 2;
  string replica_id = 3;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message PushNewLogsRspPb {
}

message FetchMetaReqPb {
  string db_name = 1;
  string backup_node_id = 2;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message FetchMetaRspPb {
  repeated string file_list = 1;
}

message FetchFileReqPb {
  string db_name = 1;
  string backup_node_id = 2;
  string file = 3;
  uint64 offset = 4;
  uint32 crc32 = 5;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message FetchFileRspPb {
  bool is_finish = 1;
  uint32 crc32 = 2;
}

service MasterWorkerOCService {
  rpc PublishMeta(PublishMetaReqPb) returns (PublishMetaRspPb) {}
  rpc ClearData(ClearDataReqPb) returns (ClearDataRspPb) {}
  rpc MetaChange(MetaChangeReqPb) returns (MetaChangeRspPb) {}
  rpc UpdateNotification(UpdateObjectReqPb) returns (UpdateObjectRspPb) {}
  rpc DeleteNotification(DeleteObjectReqPb) returns (DeleteObjectRspPb) {}
  rpc QueryGlobalRefNumOnWorker(QueryGlobalRefNumReqPb) returns (QueryGlobalRefNumRspPb) {}
  rpc PushMetaToWorker(PushMetaToWorkerReqPb) returns (PushMetaToWorkerRspPb) {}
  rpc RequestMetaFromWorker(RequestMetaFromWorkerReqPb) returns (RequestMetaFromWorkerRspPb) {}
  rpc ChangePrimaryCopy(ChangePrimaryCopyReqPb) returns (ChangePrimaryCopyRspPb) {}
  rpc NotifyMasterIncNestedRefs(NotifyMasterIncNestedReqPb) returns (NotifyMasterIncNestedResPb) {}
  rpc NotifyMasterDecNestedRefs(NotifyMasterDecNestedReqPb) returns (NotifyMasterDecNestedResPb) {}
}

service ReplicationService {
	rpc TryPSync(TryPSyncReqPb) returns (TryPSyncRspPb) {}
	rpc PushNewLogs(PushNewLogsReqPb) returns (PushNewLogsRspPb) {
	option (datasystem.send_payload_option) = true;
}
	rpc FetchMeta(FetchMetaReqPb) returns (FetchMetaRspPb) {}
	rpc FetchFile(FetchFileReqPb) returns (FetchFileRspPb) {
	option (datasystem.recv_payload_option) = true;
}
}
