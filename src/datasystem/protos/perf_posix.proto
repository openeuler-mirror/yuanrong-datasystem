/**
 * Description: Defines the POSIX API of the performance service.
 */
syntax = "proto3";
package datasystem;

message GetPerfLogReqPb {
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GetPerfLogRspPb {
  message PerfLogPb {
    string key_name = 1;
    uint64 count = 2;
    uint64 min_time = 3;
    uint64 max_time = 4;
    uint64 total_time = 5;
    uint64 avg_time = 6;
    uint64 max_frequency = 7;
    string node_type = 8;
  }
  repeated PerfLogPb perf_logs = 1;
}

message ResetPerfLogReqPb {
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ResetPerfLogRspPb {
}

service PerfService {
  rpc GetPerfLog(GetPerfLogReqPb) returns (GetPerfLogRspPb) {}
  rpc ResetPerfLog(ResetPerfLogReqPb) returns (ResetPerfLogRspPb) {}
}