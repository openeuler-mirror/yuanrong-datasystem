/**
 * Description: Defines the proto between the master and the worker.
 */
syntax = "proto3";
package datasystem.master;
import "google/protobuf/any.proto";

enum NodeTypePb {
  NONE = 0;
  GCS_NODE = 1;
  WORKER_NODE = 2;
}

message HeartbeatReqPb {
  NodeTypePb type = 1;
  string ip_address = 2;
  string node_id = 3; // Currently, used only by the GCS node.
  bool first_msg = 4;  // The flag for whether the message is the first heartbeat message.
  string git_hash = 5;

  repeated google.protobuf.Any extend = 50;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message HeartbeatRspPb {
  repeated google.protobuf.Any extend = 100;
}


service MasterService {
  rpc Heartbeat(HeartbeatReqPb) returns(HeartbeatRspPb) {}
}
