/**
 * Description: Defines the RPC API of the master component, including the meta of the object cache and state cache.
 */
syntax = "proto3";
package datasystem.master;
import "datasystem/protos/object_posix.proto";
import "datasystem/protos/worker_object.proto";
import "datasystem/protos/utils.proto";
import "datasystem/protos/rpc_option.proto";
import "datasystem/protos/p2p_subscribe.proto";

option cc_enable_arenas = true;

message WorkerObjectInfoPb {
  bool exist_valid_obj = 1; // Valid object exists on the worker process.
  bool exist_g_ref = 2; // Global reference exists on the worker process.
}

message ObjectHeartbeatReqExtendPb {
  bool received_reconciliation = 1; // Received reconciliation notification.
  bool received_push_meta = 2; // Received push data notification.
}

message ObjectHeartbeatRspExtendPb {
  bool need_reconciliation = 1; // Need to wait for the message pushed by the master to reconciliation.
  bool need_push_meta = 2; // Need the worker to push metadata to the master.
}

message CreateMetaReqPb {
  ObjectMetaPb meta = 1;
  repeated string nested_keys = 2;
  string address = 3; // object store server address
  int64 timeout = 4;
  bool redirect = 5; // redirect to get hash meta address

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message CreateMetaRspPb {
  uint64 version = 1; // version control
  RedirectMetaInfo info = 2;
  bool meta_is_moving = 4;
}

message CreateMultiMetaReqPb {
  repeated ObjectBaseInfoPb metas = 1;
  string address = 2;
  int64 timeout = 3;
  bool isTx = 4;
  bool is_pre_commit = 5;
  bool redirect = 6;
  ConfigPb config = 7;
  uint64 version = 8; // version control
  // For the meaning of the value, see 'ObjectLifeState' enum class.
  uint32 life_state = 9;
  uint32 ttl_second = 10;
  ExistenceOptPb existence = 11;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message CreateMultiMetaRspPb {
  uint64 version = 1;
  repeated string failed_object_keys = 2;
  ErrorInfoPb last_rc = 3;
  repeated RedirectMetaInfo info = 4;
  bool meta_is_moving = 5;
}

message CreateMultiMetaPhaseTwoReqPb {
  repeated string object_keys = 1;
  string address = 2;
  uint32 write_mode = 3;
  uint32 consistency_type = 4;
  int64 timeout = 5;
  bool redirect = 6;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message RollbackMultiMetaReqPb {
  repeated string object_keys = 1;
  string address = 2;
  int64 timeout = 3;
  bool redirect = 4;
  bool persistence_only = 5;
  repeated uint64 versions = 6;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message RollbackMultiMetaRspPb {
  repeated string failed_object_keys = 1;
  repeated RedirectMetaInfo info = 2;
  bool meta_is_moving = 3;
}

message CreateCopyMetaReqPb {
  string object_key = 1;
  uint32 data_format = 2;
  string address = 3; // object store server address
  bool redirect = 4;
  uint64 version = 5;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message CreateCopyMetaRspPb {
  uint64 version = 1;
  uint32 life_state = 2;
  RedirectMetaInfo info = 3;
  bool meta_is_moving = 4;
}
message MultiCopyMetaReqElem {
  string object_key = 1;
  uint32 data_format = 2;
  uint64 version = 3;
}

message CreateMultiCopyMetaReqPb {
  repeated MultiCopyMetaReqElem multi_copy_meta_req_elems = 1;
  string address = 2; // object store server address
  bool redirect = 3;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message CreateMultiCopyMetaRspPb {
  repeated string failed_object_keys = 1; // failed keys, not retry
  repeated RedirectMetaInfo info = 2;
  bool meta_is_moving = 3;
}

message QueryMetaReqPb {
  repeated bytes ids = 1;
  string address = 2; // subscriber address for publish
  int64 sub_timeout = 3; // subscriber timeout
  string request_id = 4;
  int64 timeout = 5; // rpc timeout
  bool redirect = 6;
  bool is_from_other_az = 7;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message QueryMetaInfoPb {
  ObjectMetaPb meta = 1;
  string address = 2;
  repeated uint32 payload_indexs = 3;
  bool is_from_other_az = 4;
  bool single_copy = 5;
}

message QueryMetaRspPb {
  repeated QueryMetaInfoPb query_metas = 1;
  repeated RedirectMetaInfo info = 2;
  bool meta_is_moving = 4;
  repeated string not_exist_ids = 5;
  repeated uint64 deleting_versions = 6;
  repeated string not_exist_ids_is_deleting = 7;
}

message RemoveMetaReqPb {
  enum Cause {
    NORMAL = 0;
    EVICTION = 1;
    INVALID_BUFFER = 2;
    GIVEUP_PRIMARY = 3; // voluntary scale down clear meta location.
    OTHER_AZ_META_UPDATE = 4;
  }
  bytes address = 1;
  repeated string ids = 2;
  Cause cause = 3;
  int64 timeout = 4;
  uint64 version = 5;
  bool redirect = 6;

  message ObjKeyWithVersionPb {
    string id = 1;
    uint64 version = 2;
  }
  // It is more reasonable to use "map" here. However, since the order after "map" serialization is uncertain,
  // it is not applicable in scenarios where ak/sk authentication is used, so currently only "repeated" can be used.
  repeated ObjKeyWithVersionPb id_with_version = 7;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message RemoveMetaRspPb {
  repeated string success_ids = 1;
  repeated string need_data_ids = 2;
  repeated string need_wait_ids = 3;
  repeated string failed_ids = 4;
  repeated RedirectMetaInfo info = 5;
  bool meta_is_moving = 6;
  repeated string outdated_ids = 7;
}

message RollbackSealReqPb {
  string object_key = 1;
  string address = 2;
  uint32 old_life_state = 3;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message RollbackSealRspPb {
}

message DeleteAllCopyMetaReqPb {
  bytes address = 1;
  repeated string object_keys = 2;
  int64 timeout = 3;
  bool redirect = 4;
  bool are_device_objects = 5;
  bool need_forward_objs_without_meta = 6;

  message ObjKeyWithVersionPb {
    string id = 1;
    uint64 version = 2;
  }
  // It is more reasonable to use "map" here. However, since the order after "map" serialization is uncertain,
  // it is not applicable in scenarios where ak/sk authentication is used, so currently only "repeated" can be used.
  repeated ObjKeyWithVersionPb ids_with_version = 7;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message DeleteAllCopyMetaInfoPb {
  string object_key = 1;
  Status status = 2;

  enum Status {
    SUCCESSFUL = 0;
    FAILED = 1;
    NOT_EXIST = 2;
    GREF_COUNT = 3;
  }
}

message DeleteAllCopyMetaRspPb {
  repeated DeleteAllCopyMetaInfoPb delete_result = 1;
  repeated string failed_object_keys = 2;
  ErrorInfoPb last_rc = 3;
  repeated RedirectMetaInfo info = 4;
  bool meta_is_moving = 5;
  repeated string objs_without_meta = 6;
  repeated string outdated_objs = 7;  // for cross az.
}

message BinaryFormatParams{
  uint32 write_mode = 8;
  uint32 data_format = 9;
  uint32 consistency_type = 10;
  bool keep = 11;
  uint32 cache_type = 12;
}

message UpdateMetaReqPb {
  string object_key = 1;
  string address = 2;
  uint32 life_state = 3;
  int64 timeout = 6;
  // for binary format, varying size.
  uint64 data_size = 7;
  BinaryFormatParams binary_format_params = 8;
  repeated string nested_keys = 9;
  uint32 ttl_second = 10;
  bool redirect = 11; // redirect to get hash meta address

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message UpdateMetaRspPb {
    uint64 version = 1; // version control
    RedirectMetaInfo info = 2;
    bool meta_is_moving = 3;
}

message GIncreaseReqPb  {
  bytes address = 1;
  repeated string object_keys = 2;
  string remote_client_id = 3;
  bool redirect = 4;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
};

message GIncreaseRspPb {
  repeated string failed_object_keys = 1;
  ErrorInfoPb last_rc = 2;
  repeated RedirectMetaInfo infos = 3;
  bool ref_is_moving = 4;
}

message GIncNestedRefReqPb  {
  bytes address = 1;
  repeated string object_keys = 2;
  bool redirect = 3;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
};

message GIncNestedRefRspPb {
  repeated string failed_object_keys = 1;
  repeated RedirectMetaInfo infos = 2;
  bool ref_is_moving = 3;
}

message GDecNestedRefReqPb
{
  bytes address = 1;
  repeated string object_keys = 2;
  int64 timeout = 3;
  bool redirect = 4;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GDecNestedRefRspPb {
  repeated string failed_object_keys = 1;
  repeated string no_ref_ids = 2;
  repeated string nested_object_keys = 3;
  repeated RedirectMetaInfo infos = 4;
  bool ref_is_moving = 5;
}

message GDecreaseReqPb {
  bytes address = 1;
  repeated string object_keys = 2;
  int64 timeout = 3;
  string remote_client_id = 4;
  bool redirect = 5;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GDecreaseRspPb {
  repeated string failed_object_keys = 1;
  repeated string no_ref_ids = 2;
  ErrorInfoPb last_rc = 3;
  repeated RedirectMetaInfo infos = 4;
  bool ref_is_moving = 5;
}

message ReleaseGRefsReqPb {
  bytes address = 1;
  int64 timeout = 2;
  string remote_client_id = 3;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ReleaseGRefsRspPb {
  ErrorInfoPb last_rc = 1;
  RedirectMetaInfo info = 2;
}

message IncrSeqNoMetaReqPb  {
}

message IncrSeqNoMetaRspPb {
}

message GetSeqNoMetaReqPb  {
}

message GetSeqNoMetaRspPb {
}

message DelSeqNoMetaReqPb  {
}

message DelSeqNoMetaRspPb {
}

message PushMetaToMasterReqPb {
  bytes address = 1;
  repeated ObjectMetaPb metas = 2; // Need persisted object metadata.
  repeated string gref_object_keys = 3; // Global reference object key list.

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message PushMetaToMasterRspPb {
}

message ReconciliationQueryPb {
  string hostport = 1;
  int64 event_timestamp = 2;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ReconciliationRspPb {
}

message ObjectAsyncOpDetailPb {
  uint32 op_type = 1;
  uint64 remove_meta_version = 2;
  repeated string remove_meta_az_names = 3;
  uint64 delete_all_copy_version = 4;
  repeated string delete_all_copy_az_names = 5;
  uint64 delete_object_version = 6;
}

message ObjectAsyncOpPb {
  string worker_addr = 1;
  ObjectAsyncOpDetailPb async_op = 2;
}

message GlobalCacheDelPb {
  uint64 object_version = 1;
  uint64 delete_version = 2;
  string target_worker_address = 3;
}

message AsyncElementPb {
  string table = 1;
  string key = 2;
  bytes value = 3;
  uint32 op = 4;
  uint64 timestamp = 5;
  string trace_id = 6;
}

message LocationInfoPb {
  string location = 1;
  bool ack = 2;
}

message MetaForMigrationPb {
  string object_key = 1;
  bytes meta = 2;
  repeated string locations = 3;
  uint64 value = 4;
  uint32 remain_ttl_second = 5;
  repeated ObjectAsyncOpPb async_ops = 6;
  bool enable_ttl = 7;
  repeated string client_ids = 8;
  bool only_ref = 9;
  repeated string nested_object_keys = 10;
  uint64 nested_ref = 11;
  repeated GlobalCacheDelPb global_cache_dels = 12;
  repeated AsyncElementPb wait_async_to_l2_elements = 13;
  repeated LocationInfoPb new_locations = 14;
}

message RootInfoForMigrationPb {
  string peer_id = 1;
  bytes root_info = 2;
}

message NpuEventsForMigrationPb {
  string npu_id = 1;
  repeated SubscribeReceiveEventRspPb npu_events = 2;
}

message HcclRelationshipPb {
  string data_receiver_id = 1;
  repeated string data_sender_id = 2;
}

message MigrateMetadataReqPb {
  string source_addr = 1;
  repeated MetaForMigrationPb object_metas = 2;
  // remote client master app ref
  repeated ClientIdRefsForMigrationPb client_id_refs = 3;
  // for out-cloud reference counting.
  repeated string remote_client_ids = 4;
  repeated SubscribeInfoPb sub_metas = 5;

  // for device object meta
  repeated DeviceObjectMetaPb device_object_metas = 6;
  // for root info
  repeated RootInfoForMigrationPb root_info_metas = 7;
  // for npu events
  repeated NpuEventsForMigrationPb npu_events_metas = 8;
  // for hccl relation graph
  repeated HcclRelationshipPb hccl_relationship = 9;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message SubscribeInfoPb {
  string request_id = 1;
  string sub_address = 2;
  uint64 timeout = 3;
  repeated string objectKeys = 4;
  bool is_from_other_az = 5;
}

message MigrateNestedMetaDataRspPb {
  repeated Status dependency_results = 1;
  repeated Status nested_ref_results = 2;

  enum Status {
    SUCCESSFUL = 0;
    FAILED = 1;
  }
}

message MigrateMetadataRspPb {
  repeated Status results = 1;

  enum Status {
    SUCCESSFUL = 0;
    FAILED = 1;
  }
}

message ClientIdRefsForMigrationPb {
  string remote_client_id = 1;
  repeated string master_addrs = 2;
}

message GetObjectLocationsReqPb {
  repeated string object_keys = 1;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ObjectLocationInfoPb {
  string object_key = 1;
  repeated string object_locations = 2;
  uint64 object_size = 3;
}

message GetObjectLocationsRspPb {
  repeated ObjectLocationInfoPb location_infos = 1;
}

message ReplacePrimaryReqPb {
  message ObjectInfoPb {
    string object_key = 1;
    uint64 version = 2;
  }
  repeated ObjectInfoPb object_infos = 1;
  string origin_primary_addr = 2;
  string new_primary_addr = 3;
  bool redirect = 4;
  bool remove_location = 5;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ReplacePrimaryRspPb {
  repeated string success_ids = 1;
  repeated string expired_ids = 2;
  repeated string failed_ids = 3;
  repeated RedirectMetaInfo info = 4;
  bool meta_is_moving = 5;
}

message PureQueryMetaReqPb {
  repeated bytes object_keys = 1;
  bool redirect = 2;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message PureQueryMetaRspPb {
  repeated QueryMetaInfoPb query_metas = 1;
  repeated RedirectMetaInfo info = 2;
  bool meta_is_moving = 3;
}

message ExpireReqPb {
  repeated string object_keys = 1;
  uint32 ttl_second = 2;
  bool redirect = 3;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ExpireRspPb {
  repeated string absent_object_keys = 1;
  repeated string failed_object_keys = 2;
  ErrorInfoPb last_rc = 3;
  repeated RedirectMetaInfo info = 4;
  bool meta_is_moving = 5;
}

message WorkerStat {
  string address = 1;
  uint64 available_memory = 2;
  bool is_ready = 3;
}

message ResourceReportReqPb {
  WorkerStat stat = 1;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ResourceReportRspPb {
  repeated WorkerStat stats = 1;
}

service MasterOCService {
  rpc CreateMeta (CreateMetaReqPb) returns (CreateMetaRspPb) {}
  rpc CreateCopyMeta (CreateCopyMetaReqPb) returns (CreateCopyMetaRspPb) {}
  rpc CreateMultiCopyMeta (CreateMultiCopyMetaReqPb) returns (CreateMultiCopyMetaRspPb) {}
  rpc QueryMeta(QueryMetaReqPb) returns (QueryMetaRspPb) {
    option (datasystem.recv_payload_option) = true;
  }
  rpc RemoveMeta (RemoveMetaReqPb) returns (RemoveMetaRspPb) {}
  rpc DeleteAllCopyMeta (DeleteAllCopyMetaReqPb) returns (DeleteAllCopyMetaRspPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc UpdateMeta(UpdateMetaReqPb) returns (UpdateMetaRspPb) {}
  rpc GetObjectLocations(GetObjectLocationsReqPb) returns (GetObjectLocationsRspPb) {}
  rpc GIncreaseRef(GIncreaseReqPb) returns (GIncreaseRspPb) {}
  rpc GDecreaseRef(GDecreaseReqPb) returns (GDecreaseRspPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc QueryGlobalRefNum(QueryGlobalRefNumReqPb) returns (QueryGlobalRefNumRspCollectionPb) {}
  rpc IncrSeqNoMeta(IncrSeqNoMetaReqPb) returns (IncrSeqNoMetaRspPb) {option deprecated = true;}
  rpc GetSeqNoMeta(GetSeqNoMetaReqPb) returns (GetSeqNoMetaRspPb) {option deprecated = true;}
  rpc DelSeqNoMeta(DelSeqNoMetaReqPb) returns (DelSeqNoMetaRspPb) {option deprecated = true;}
  rpc PushMetaToMaster(PushMetaToMasterReqPb) returns (PushMetaToMasterRspPb) {}
  rpc RollbackSeal(RollbackSealReqPb) returns (RollbackSealRspPb) {}
  rpc GIncNestedRef(GIncNestedRefReqPb) returns (GIncNestedRefRspPb) {}
  rpc GDecNestedRef(GDecNestedRefReqPb) returns (GDecNestedRefRspPb) {}
  rpc IfNeedTriggerReconciliation(ReconciliationQueryPb) returns (ReconciliationRspPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc MigrateMetadata(MigrateMetadataReqPb) returns (MigrateMetadataRspPb) {}
  rpc GIncreaseMasterAppRef(GIncreaseReqPb) returns (GIncreaseRspPb) {}
  rpc ReleaseGRefs(ReleaseGRefsReqPb) returns (ReleaseGRefsRspPb) {}
  rpc ReleaseGRefsOfRemoteClientId(ReleaseGRefsReqPb) returns (ReleaseGRefsRspPb) {}
  rpc CreateMultiMeta(CreateMultiMetaReqPb) returns (CreateMultiMetaRspPb) {}
  rpc ReportResource(ResourceReportReqPb) returns (ResourceReportRspPb) {}


  // Heterogeneous Memory Object RPCs.
  rpc PutP2PMeta(PutP2PMetaReqPb) returns (PutP2PMetaRspPb) {}
  rpc SubscribeReceiveEvent(SubscribeReceiveEventReqPb) returns (SubscribeReceiveEventRspPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc GetP2PMeta(GetP2PMetaReqPb) returns (GetP2PMetaRspPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc SendRootInfo(SendRootInfoReqPb) returns (SendRootInfoRspPb) {}
  rpc RecvRootInfo(RecvRootInfoReqPb) returns (RecvRootInfoRspPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc GetDataInfo(GetDataInfoReqPb) returns (GetDataInfoRspPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc AckRecvFinish(AckRecvFinishReqPb) returns (AckRecvFinishRspPb) {}
  rpc RemoveP2PLocation(RemoveP2PLocationReqPb) returns (RemoveP2PLocationRspPb) {}
  rpc ReleaseMetaData(ReleaseMetaDataReqPb) returns (ReleaseMetaDataRspPb) {}
  rpc ReplacePrimary(ReplacePrimaryReqPb) returns (ReplacePrimaryRspPb) {}
  rpc PureQueryMeta(PureQueryMetaReqPb) returns (PureQueryMetaRspPb) {}
  rpc RollbackMultiMeta(RollbackMultiMetaReqPb) returns (RollbackMultiMetaRspPb) {}
  rpc CreateMultiMetaPhaseTwo(CreateMultiMetaPhaseTwoReqPb) returns (CreateMultiMetaRspPb) {}
  rpc Expire(ExpireReqPb) returns (ExpireRspPb) {}
  rpc GetMetaInfo(GetMetaInfoReqPb) returns (GetMetaInfoRspPb) {}
}
