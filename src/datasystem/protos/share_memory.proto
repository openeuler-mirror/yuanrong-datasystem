syntax = "proto3";
package datasystem;
import "google/protobuf/any.proto";

option cc_enable_arenas = true;

message GetClientFdReqPb {
    bytes client_id = 1;
    repeated int32 worker_fds = 2;
    string token = 3;
    string tenant_id = 4;
    uint64 request_id = 5;

    // put to the end, the previous data is used to generate AK and SK signatures.
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

message GetClientFdRspPb {
}

message RegisterClientReqPb {
    string token = 1;
    string version = 2;
    bytes client_id = 3;
    string git_hash = 4;
    bool heartbeat_enabled = 5;
    bool shm_enabled = 6;
    int32 server_fd = 7;
    string tenant_id = 8;
    bool enable_cross_node = 9;
    string pod_name = 10;
    bool enable_exclusive_connection = 11;
    bool support_multi_shm_ref_count = 12;


    // DFX required, need to send something to worker when reconnect.
    repeated google.protobuf.Any extend = 50;

    // put to the end, the previous data is used to generate AK and SK signatures.
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

message RegisterClientRspPb {
    int32 page_size = 1;
    bytes client_id = 2;
    double quorum_timeout_mult = 3;
    uint32 lock_id = 4;
    uint64 shm_threshold = 5;
    bytes worker_start_id = 6;
    string worker_uuid = 7;
    string standby_worker = 8;
    uint64 node_timeout_s = 9;
    string az_name = 10;
    int64 store_fd = 11;
    uint64 mmap_size = 12;
    uint64 offset = 13;
    string shm_id = 14;
    uint64 client_dead_timeout_s = 15;
    bool enable_huge_tlb = 16; // the status of HUGE_TLB switch
    bool unhealthy = 17;
    repeated string available_workers = 18;
    bool enable_p2p_transfer = 19;
    uint64 client_reconnect_wait_s = 20;
    string exclusive_conn_sockpath = 21;
    bool support_multi_shm_ref_count = 22;

    // put to the end, the previous data is used to generate AK and SK signatures.
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

message DisconnectClientReqPb {
    bytes client_id = 1;
    bytes token = 2;

    // put to the end, the previous data is used to generate AK and SK signatures.
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

message DisconnectClientRspPb {
}

message HeartbeatReqPb{
    bytes client_id = 1;
    bytes token = 2;
    repeated int64 released_worker_fds = 3;
    // If client is removable, worker will not wait when exit.
    bool removable = 4;

    // put to the end, the previous data is used to generate AK and SK signatures.
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

message HeartbeatRspPb{
    bytes worker_start_id = 1;
    bool client_removed = 2;
    string standby_worker = 3;
    bool is_voluntary_scale_down = 4;
    repeated int64 expired_worker_fds = 5;
    repeated string available_workers = 6;
    bool unhealthy = 7;
}

message GetSocketPathReqPb {
    string token = 1;
    string tenant_id = 2;

    // put to the end, the previous data is used to generate AK and SK signatures.
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

message GetSocketPathRspPb {
    string path = 1;
}

service WorkerService {
    rpc GetClientFd (GetClientFdReqPb) returns (GetClientFdRspPb) {}
    rpc GetSocketPath (GetSocketPathReqPb) returns (GetSocketPathRspPb) {}
    rpc RegisterClient (RegisterClientReqPb) returns (RegisterClientRspPb) {}
    rpc DisconnectClient (DisconnectClientReqPb) returns (DisconnectClientRspPb) {}
    rpc Heartbeat (HeartbeatReqPb) returns (HeartbeatRspPb) {}
}
