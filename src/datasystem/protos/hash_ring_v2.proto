syntax = "proto3";

package datasystem.v2;

option cc_enable_arenas = true;

message WorkerPb {
  enum StatePb {
    INITIAL = 0;
    JOINING = 1;
    ACTIVE = 2;
    LEAVING = 3;
    PRE_LEAVING = 4;
  }

  repeated uint32 hash_tokens = 1;
  bytes worker_uuid = 2;
  StatePb state = 3;
}

message TokenRangePb {
  string worker = 1;
  uint32 from = 2;
  uint32 end = 3;
  bool finished = 4;
}

message MigrateTaskPb {
  string target_worker = 1;
  repeated TokenRangePb source_ranges = 2;
}

message DeleteNodeTaskPb {
  string failed_worker = 1;
  repeated TokenRangePb recovery_ranges = 2;
}

message TaskNotifyPb {
  enum TypePb {
    SCALE_OUT = 0;
    ACTIVE_SCALE_IN = 1;
    PASSIVE_SCALE_IN = 2;
  }

  TypePb type = 1;
  repeated string task_ids = 2;
}

message HashRingPb {
  bool cluster_has_init = 1;
  map<string, WorkerPb> workers = 2;
  uint64 version = 3;
  string schema_version = 4;
}
