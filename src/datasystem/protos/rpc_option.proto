/**
 * Description: Defines the meta header message of the zmq server.
 */
syntax = "proto3";
package datasystem;
import "google/protobuf/descriptor.proto";

option cc_enable_arenas = true;

// Extend the rpc method. ZMQ plugin will
// generate an extra payload unique pointer
// in the function signature.
extend google.protobuf.MethodOptions {
    optional bool send_payload_option = 50000;
    optional bool recv_payload_option = 50001;
    optional bool unary_socket_option = 50002;
    optional bool urma_enabled_option = 50003;
}

extend google.protobuf.EnumValueOptions {
  optional string name = 50004;
}

enum ServiceSocketNames {
  DEFAULT_SOCK = 0 [(name) = "client.sock"];
  MASTER_SOCK = 1 [(name) = "master.sock"];
}

extend google.protobuf.ServiceOptions {
  optional uint64 channel_number_option = 50006;
  optional bool multi_session_option = 50007;
}
