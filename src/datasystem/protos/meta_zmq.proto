/**
 * Description: Defines the meta header message of the zmq server.
 */
syntax = "proto3";
package datasystem;
import "utils.proto";

option cc_enable_arenas = true;

message TickPb {
    uint64 ts = 1;
    string tick_name = 2;
}

// This is the header message sent by the client
message MetaPb {
    string svc_name = 1;
    int32 method_index = 2;
    int64 payload_index = 3;
    string client_id = 4;
    string worker_id = 5;
    string gateway_id = 6;
    string routing_fd = 7;  // Deprecated
    int32 event_type = 8;
    repeated TickPb ticks = 9;
    string trace_id = 10;
    int64 timeout = 11;
    string db_name = 12;
    int32 route_fd = 13;  // New version of routing_fd

    // ak/sk required.
    string tenant_id = 98;
    string token = 99;
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

// Type of event. Internal use only. Do not use
enum EventType {
    ZMQ = 0;
    V1MTP = 1;
    V2MTP = 2;
}

message MultiMsgHdrPb {
    repeated uint64 msg_size = 1;
}

message HandshakePb {
    uint64 payload_sz = 1;
    uint64 total_packets = 2;
    repeated uint32 data_sizes = 3;
}

message HandshakeTokenPb {
    int64 token = 1;
    int64 payload_index = 2;
}

message PayloadDirectGetReqPb {
    int64 id = 1;
    int64 addr = 2;
    uint64 sz = 3;
    int32 error_code = 4;
    bytes error_msg = 5;
}

message PayloadDirectGetRspPb {
    int64 addr = 1;
    uint64 sz = 2;
}

// Exchange of jfr. Send our local jfr and host port
message JfrBondInfo {
    message JettyId {
        bytes eid = 1;
        uint32 uasid = 2;
        uint32 id = 3;
    }
    JettyId base_id = 1;
    repeated JettyId slave_ids = 2;
    int32 dev_num = 3;
    bool is_in_matrix_server = 4;
    bool is_multipath = 5;
}

message UrmaHandshakeReqPb {
    bytes eid = 1;
    uint32 uasid = 2;
    repeated uint32 jfr_ids = 3;
    HostPortPb address = 4;
    repeated JfrBondInfo bond_infos = 5;
    repeated UrmaImportSegmentPb seg_infos = 6;
}

message UrmaHandshakeRspPb {
}

message RdmaHandshakeReqPb {
}

message RdmaHandshakeRspPb {
}
