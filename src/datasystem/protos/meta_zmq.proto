/**
 * Description: Defines the meta header message of the zmq server.
 */
syntax = "proto3";
package datasystem;

import "datasystem/protos/utils.proto";

option cc_enable_arenas = true;

message TickPb {
    uint64 ts = 1;
    string tick_name = 2;
}

// Request log sampling state carried by RPC metadata.
// This single state avoids expanding MetaPb with multiple boolean flags.
enum LogSampleState {
    // Not an SDK request trace. Background and internal logs are not sampled by log_rate_limit.
    LOG_SAMPLE_NONE = 0;

    // SDK request trace admitted by log_rate_limit. INFO/WARNING logs should be kept across RPC hops.
    LOG_SAMPLE_ADMIT = 1;

    // SDK request trace rejected by log_rate_limit. INFO/WARNING logs are dropped, but ERROR/FATAL still print.
    LOG_SAMPLE_REJECT = 2;

    // SDK request trace without a propagated sampling decision yet.
    // The receiving side may decide locally based on its own log_rate_limit.
    LOG_SAMPLE_UNDECIDED = 3;
}

// This is the header message sent by the client
message MetaPb {
    string svc_name = 1;
    int32 method_index = 2;
    int64 payload_index = 3;
    string client_id = 4;
    string worker_id = 5;
    string gateway_id = 6;
    string routing_fd = 7;  // Deprecated
    int32 event_type = 8;
    repeated TickPb ticks = 9;
    string trace_id = 10;
    int64 timeout = 11;
    string db_name = 12;
    int32 route_fd = 13;  // New version of routing_fd
    LogSampleState log_sample_state = 14;
    // RPC latency metric timestamps. This is separate from ticks because ticks is the GetLapTime perf timeline.
    repeated TickPb latency_ticks = 15;

    // ak/sk required.
    string tenant_id = 98;
    string token = 99;
    uint64 timestamp = 100;
    string signature = 101;
    string access_key = 102;
}

// Type of event. Internal use only. Do not use
enum EventType {
    ZMQ = 0;
    V1MTP = 1;
    V2MTP = 2;
}

message MultiMsgHdrPb {
    repeated uint64 msg_size = 1;
}

message HandshakePb {
    uint64 payload_sz = 1;
    uint64 total_packets = 2;
    repeated uint32 data_sizes = 3;
}

message HandshakeTokenPb {
    int64 token = 1;
    int64 payload_index = 2;
}

message PayloadDirectGetReqPb {
    int64 id = 1;
    int64 addr = 2;
    uint64 sz = 3;
    int32 error_code = 4;
    bytes error_msg = 5;
}

message PayloadDirectGetRspPb {
    int64 addr = 1;
    uint64 sz = 2;
}
