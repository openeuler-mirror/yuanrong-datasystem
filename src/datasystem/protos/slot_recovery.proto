/**
 * Description: Defines the protobuf used by the slot recovery coordination layer.
 */
syntax = "proto3";

package datasystem;

option cc_enable_arenas = true;

message RecoveryTaskPb {
  enum TaskStatus {
    PENDING = 0;
    IN_PROGRESS = 1;
    COMPLETED = 2;
    FAILED = 3;
  }

  string failed_worker = 1;
  string owner_worker = 2;
  repeated uint32 slots = 3;
  TaskStatus task_status = 4;
}

message SlotRecoveryInfoPb {
  repeated RecoveryTaskPb recovery_tasks = 1;
  uint32 total_slots = 2;
  uint32 completed_slots = 3;
  uint32 failed_slots = 4;
}
