/**
 * Description: Defines the proto for ut requests.
 */
syntax = "proto3";
package datasystem;

option cc_enable_arenas = true;

message GRefTableReqPb {
  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GRefTableRspPb {
  message SingleClientGRefPb {
    string hostport = 1;
    repeated string object_keys = 2;
  }
  repeated SingleClientGRefPb single_client_gref = 1;
}

message CmNodeTableReqPb {
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message CmNodeTableRspPb {
  message CmNodePb {
    string hostport = 1;
    string time_epoch = 2;
    string state = 3;
    string addition_event_type = 4;
  }
  repeated CmNodePb cm_node_table = 1;
}

message TestReqPbV1 {
  uint64 filed1 = 1;
  string field2 = 2;
  uint32 field3 = 3;
  repeated string filed4 = 4;

  uint32 auth_req = 96;
  string client_id = 97;
  string token = 98;
  string tenant_id = 99;
  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message TestRspPbV1 {
}

message TestReqPbV2 {
  uint64 filed1 = 1;
  string field2 = 2;
  uint32 field3 = 3;
  repeated string filed4 = 4;
  uint64 filed5 = 5;

  uint32 auth_req = 96;
  string client_id = 97;
  string token = 98;
  string tenant_id = 99;
  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

service UtOCService {
    rpc GetWorkerGRefTable(GRefTableReqPb) returns (GRefTableRspPb) {}
    rpc GetMasterGRefTable(GRefTableReqPb) returns (GRefTableRspPb) {}
    rpc GetCmNodeTable(CmNodeTableReqPb) returns (CmNodeTableRspPb) {}
    rpc TestUnaryCompatibilityV1(TestReqPbV1) returns (TestRspPbV1) {}
    rpc TestStreamCompatibilityV1(stream TestReqPbV1) returns (stream TestRspPbV1) {}
    rpc TestStreamCompatibility1V1(stream TestReqPbV1) returns (TestRspPbV1) {}
    rpc TestUnaryCompatibilityV2(TestReqPbV2) returns (TestRspPbV1) {}
    rpc TestStreamCompatibilityV2(stream TestReqPbV2) returns (stream TestRspPbV1) {}
    rpc TestStreamCompatibility1V2(stream TestReqPbV2) returns (TestRspPbV1) {}
}
