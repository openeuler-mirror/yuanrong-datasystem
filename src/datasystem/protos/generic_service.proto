/**
 * Description: Defines the proto of worker, master and gcs common service.
 */
syntax = "proto3";
package datasystem;

option cc_enable_arenas = true;

message GcovFlushReqPb {
  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GcovFlushRspPb {
}

message SetInjectActionReqPb {
  string name = 1;
  string action = 2;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message SetInjectActionRspPb {
}

message ClearInjectActionReqPb {
  string name = 1;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message ClearInjectActionRspPb {
}

message GetInjectActionExecuteCountReqPb {
  string name = 1;

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}

message GetInjectActionExecuteCountRspPb {
    uint64 execute_count = 1;
}

service GenericService {
  rpc GcovFlush (GcovFlushReqPb) returns (GcovFlushRspPb) {}
  rpc SetInjectAction (SetInjectActionReqPb) returns (SetInjectActionRspPb) {}
  rpc ClearInjectAction (ClearInjectActionReqPb) returns (ClearInjectActionRspPb) {}
  rpc GetInjectActionExecuteCount (GetInjectActionExecuteCountReqPb) returns (GetInjectActionExecuteCountRspPb) {}
}
