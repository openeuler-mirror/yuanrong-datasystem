/**
 * Description: Defines the meta header message of the transport server.
 */
syntax = "proto3";
package datasystem;
import "utils.proto";

message UrmaSegPb {
    bytes eid = 1;
    uint32 uasid = 2;
    uint64 va = 3;
    uint64 len = 4;
    uint32 attr = 5;
    uint32 token_id = 6;
}

message UrmaBondSegInfoPb{
  UrmaSegPb base = 1;
  repeated UrmaSegPb slaves = 2;
  int32 dev_num = 3;
}

message UrmaImportSegmentPb {
  UrmaSegPb seg = 1;
}

message UrmaRemoteAddrPb {
  uint64 seg_va = 1;
  uint64 seg_data_offset = 2;
  HostPortPb request_address = 3;
  string client_id = 4;
}

message UcpRemoteInfoPb {
  HostPortPb remote_ip_addr = 1;
  bytes remote_worker_addr = 2;
  bytes rkey = 3;
  uint64 remote_buf = 4;
}

message UrmaHandshakeReqPb {
    bytes eid = 1;
    uint32 uasid = 2;
    repeated uint32 jfr_ids = 3;
    HostPortPb address = 4;
    string urma_instance_id = 5;
    repeated UrmaImportSegmentPb seg_infos = 6;
    string client_id = 7;
}

message UrmaHandshakeRspPb {
    UrmaHandshakeReqPb hand_shake = 1;
}

enum FastTransportMode {
    TCPIP = 0;
    UB = 1;
}
