/**
 * Description: Defines the P2P interface.
 */
syntax = "proto3";
package datasystem;

import "utils.proto";

enum LifetimeParamPb {
  REFERENCE = 0;
  MOVE = 1;
}

message DataInfoPb {
  int32 data_type = 1;
  uint64 count = 2;
}

enum LocationStatePb {
  INIT = 0;
  IN_USE = 1;
  PENDING_REMOVE = 2;
}

message DeviceLocationPb {
  string client_id = 1;
  int32 device_id = 2;
  bool cache_location = 3;
  LocationStatePb location_state = 4;
  uint64 create_timestamp = 5;
  string worker_ip =6;
}

message DeviceObjectMetaPb {
  string object_key = 1;
  repeated DataInfoPb data_infos = 2;
  LifetimeParamPb lifetime = 3;
  repeated DeviceLocationPb locations = 4;
  int32 src_offset = 5;
}
message ReleaseMetaDataReqPb {
  string client_id = 1;
  string worker_address = 2; 

  // put to the end, the previous data is used to generate AK and SK signatures.
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
}
message ReleaseMetaDataRspPb {
}

message PutP2PMetaReqPb {
  repeated DeviceObjectMetaPb dev_obj_meta = 1;
  string tenant_id = 2;
  string worker_address = 3; 

  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

message PutP2PMetaRspPb {
}

message SubscribeReceiveEventReqPb {
  string src_client_id = 1;
  int32 src_device_id = 2;
  string tenant_id = 3;
  string worker_ip =4;

  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

enum SubscribeEventTypePb {
  GET_NOTIFICATION = 0;
  LIFECYCLE_EXIT_NOTIFICATION = 1;
  SUBSCRIBE_CANCEL_NOTIFICATION = 2;
  COMM_DESTROY_NOTIFICATION = 3;
}

message GetNotificationPb{
  string dst_client_id = 1;
  int32 dst_device_id = 2;
  string object_key = 3;
}

message SubscribeReceiveNpuEventPb{
  
  string object_key = 1;
  string dst_client_id = 2;
  int32 dst_device_id = 3;

  SubscribeEventTypePb event_type = 4;
  bool is_same_node = 5;
  int32 src_offset = 6;
  int32 length = 7;
}

message SubscribeReceiveEventRspPb {

  repeated SubscribeReceiveNpuEventPb npuevents = 1;
}

message GetDataInfoReqPb {
  string object_key = 1;
  string client_id = 2;
  int64 sub_timeout = 3;
  string tenant_id = 4;

  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

message GetDataInfoRspPb {
  repeated DataInfoPb data_infos = 1;
}

message GetP2PMetaReqPb {
  repeated DeviceObjectMetaPb dev_obj_meta = 1;
  int64 sub_timeout = 2;
  string tenant_id = 3;
  string worker_address = 4; 
  
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

message DeviceObjectMetaRspPb{
  string src_client_id = 1;
  int32 src_device_id = 2;
  string object_key = 3;
  ErrorInfoPb error = 4;
  bool is_same_node = 5;
}

message GetP2PMetaRspPb {
  repeated DeviceObjectMetaRspPb dev_obj_resp_meta = 1;
}

message SendRootInfoReqPb {
  string dst_client_id = 1;
  int32 dst_device_id = 2;
  bytes root_info = 3;
  string src_client_id = 4;
  int32 src_device_id = 5;
  string tenant_id = 6;

  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

message SendRootInfoRspPb{
}


message RecvRootInfoReqPb {
  string dst_client_id = 1;
  int32 dst_device_id = 2;
  string src_client_id = 3; // Used for authentication. The worker queries the clientId information.
  int32 src_device_id = 4;
  string tenant_id = 5;
  
  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

message RecvRootInfoRspPb{
  bytes root_info = 1;
}

message RemoveP2PLocationReqPb {
  string object_key = 1;
  string client_id = 2;
  int32 device_id = 3;
  string tenant_id = 4;

  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

message RemoveP2PLocationRspPb {
  bool removal_success = 1;
}

message AckRecvFinishReqPb {
  string object_key = 1;
  string src_client_id = 2;
  int32 src_device_id = 3;
  bool cache_location = 4;
  string dst_client_id = 5;
  int32 dst_device_id = 6;
  string tenant_id = 7;

  uint64 timestamp = 100;
  string signature = 101;
  string access_key = 102;
  string token = 103;
}

message AckRecvFinishRspPb {
}

message GetMetaInfoReqPb {
string client_id = 1;
string token = 2;
string tenant_id = 3;
//the keys to be queried.
repeated string object_keys = 4;
//it indicates whether the keys are used for D2H or D2D transmission, 
//and when it is true, it represents D2D transmission.
bool is_dev_key = 5; 


// put to the end, the previous data is used to generate AK and SK signatures.
uint64 timestamp = 100;
string signature = 101;
string access_key = 102;
}

message DeviceMetaInfoPb {
  uint32 device_id = 1; // device id 
  uint64 offset = 2;
  repeated uint64 blob_sizes =3; // the blob size of key
}

message GetMetaInfoRspPb {
repeated DeviceMetaInfoPb dev_meta_infos = 1; // the dev meta info of key 
}
