/**
 * Description: Defines common proto.
 */
syntax = "proto3";
package datasystem;

message ErrorInfoPb {
  int32 error_code = 1;
  bytes error_msg = 2;
}

message HostPortPb {
  string host = 1;
  int32 port = 2;
}

message RedirectMetaInfo {
  string redirect_meta_address = 1;
  repeated string change_meta_ids = 2;
}

message UrmaSegPb {
    bytes eid = 1;
    uint32 uasid = 2;
    uint64 va = 3;
    uint64 len = 4;
    uint32 attr = 5;
    uint32 token_id = 6;
}

message UrmaBondSegInfoPb{
  UrmaSegPb base = 1;
  repeated UrmaSegPb slaves = 2;
  int32 dev_num = 3;
}

message UrmaImportSegmentPb {
  UrmaSegPb seg = 1;
  UrmaBondSegInfoPb bond_info = 2;
}

message UrmaRemoteAddrPb {
  uint64 seg_va = 1;
  uint64 seg_data_offset = 2;
  HostPortPb request_address = 3;
}
