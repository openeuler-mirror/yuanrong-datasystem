/**
 * Description: Defines common proto.
 */
syntax = "proto3";
package datasystem;

message ErrorInfoPb {
  int32 error_code = 1;
  bytes error_msg = 2;
}

message HostPortPb {
  string host = 1;
  int32 port = 2;
}

message RedirectMetaInfo {
  string redirect_meta_address = 1;
  repeated string change_meta_ids = 2;
}

message UrmaImportSegmentPb {
  HostPortPb request_address = 1;
  /* segment */
  uint64 seg_va = 3;
  uint64 seg_len = 4;
  uint32 seg_flag = 5;
  uint32 seg_token_id = 6;
  uint64 seg_data_offset = 7;
}
