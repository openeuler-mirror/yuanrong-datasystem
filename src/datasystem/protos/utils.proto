/**
 * Description: Defines common proto.
 */
syntax = "proto3";
package datasystem;

option cc_enable_arenas = true;

message ErrorInfoPb {
  int32 error_code = 1;
  bytes error_msg = 2;
}

message HostPortPb {
  string host = 1;
  int32 port = 2;
}

message RedirectMetaInfo {
  string redirect_meta_address = 1;
  repeated string change_meta_ids = 2;
}

message RemoteHostSegmentPb {
  bytes name = 1;
  uint64 seg_va = 2;
  uint64 seg_len = 3;
  uint64 seg_data_offset = 4;
}

message RemoteH2DRootInfoPb {
  bytes internal = 1;
}

message RemoteH2DDataInfoPb {
  uint64 offset = 1;
  repeated uint64 sizes = 2;
}

enum DataTransferSource {
  DATA_IN_PAYLOAD = 0;
  DATA_ALREADY_TRANSFERRED = 1;
  DATA_DELAY_TRANSFER = 2;
  DATA_ALREADY_TRANSFERRED_MEMSET_META = 3;
}