/**
 * Description: An example to illustrate the zmq plugin
 */
syntax = "proto3";
package arbitrary.workspace;
import "rpc_option.proto";

option cc_enable_arenas = true;

message SayHelloPb {
  string msg = 1;
}

message ReplyHelloPb {
  string reply = 1;
}

message ChecksumPb {
  uint32 crc32 = 1;
}

service SimpleService {
  option (datasystem.channel_number_option) = 2;
  rpc HelloWorld (SayHelloPb) returns (ReplyHelloPb) {}
}

service DemoService {
  rpc SimpleGreeting (SayHelloPb) returns (ReplyHelloPb) {}
  rpc ClientStreamGreeting (stream SayHelloPb) returns (ReplyHelloPb) {}
  rpc ServerStreamGreeting (SayHelloPb) returns (stream ReplyHelloPb) {}
  rpc StreamGreeting(stream SayHelloPb) returns (stream ReplyHelloPb) {}
  // custom options
  rpc SendBigBuf (SayHelloPb) returns (ChecksumPb) {
    option (datasystem.send_payload_option) = true;
  }
  rpc RecvBigBuf (SayHelloPb) returns (ChecksumPb) {
    option (datasystem.recv_payload_option) = true;
  }
  rpc StreamSendBigBuf (stream SayHelloPb) returns (stream ChecksumPb) {
    option (datasystem.send_payload_option) = true;
  }
  rpc StreamRecvBigBuf (stream SayHelloPb) returns (stream ChecksumPb) {
    option (datasystem.recv_payload_option) = true;
  }
  rpc ServerStreamWithPayload (SayHelloPb) returns (stream ReplyHelloPb) {
    option (datasystem.send_payload_option) = true;
  }
  rpc ClientStreamWithPayload (stream SayHelloPb) returns (ReplyHelloPb) {
    option (datasystem.recv_payload_option) = true;
  }
  rpc UnarySocketSimpleGreeting(SayHelloPb) returns (ReplyHelloPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc UnarySocketSendPayload(SayHelloPb) returns (ChecksumPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.send_payload_option) = true;
  }
  rpc UnarySocketRecvPayload(SayHelloPb) returns (ChecksumPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.recv_payload_option) = true;
  }
  rpc UnarySocketSimpleError(SayHelloPb) returns (ReplyHelloPb) {
    option (datasystem.unary_socket_option) = true;
  }
  rpc UnarySocketLargePayload(SayHelloPb) returns (ChecksumPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.send_payload_option) = true;
  }
}

service MTPService {
  rpc HelloWorld3 (SayHelloPb) returns (ReplyHelloPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.recv_payload_option) = true;
  }
  rpc HelloWorld4 (SayHelloPb) returns (ReplyHelloPb) {
    option (datasystem.unary_socket_option) = true;
    option (datasystem.send_payload_option) = true;
    option (datasystem.recv_payload_option) = true;
  }
}
